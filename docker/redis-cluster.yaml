#apiVersion: storage.k8s.io/v1
#kind: StorageClass
#metadata:
#  name: redis-local-storage
#provisioner: kubernetes.io/no-provisioner
#volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-cluster-config
data:
  redis.conf: |
    port 6379
    bind 0.0.0.0
    protected-mode no
    daemonize no
    pidfile /var/run/redis_6379.pid
    loglevel notice
    logfile ""
    rdbcompression yes
    rdbchecksum yes
    save 900 1
    save 300 10
    save 60 10000
    dir /data
    appendonly yes
    appendfilename "appendonly.aof"
    appendfsync everysec
    cluster-enabled yes
    cluster-config-file nodes.conf
    cluster-node-timeout 15000
    cluster-require-full-coverage no
    # 宣告域名相关配置
    cluster-announce-ip {{POD_NAME}}.redis-cluster-service
    cluster-announce-port 6379
    cluster-announce-bus-port 16379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster-service
spec:
  selector:
    app: redis-cluster
  clusterIP: None
  ports:
  - name: redis-port
    port: 6379
    targetPort: 6379
  - name: redis-cluster-port
    port: 16379
    targetPort: 16379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cluster
spec:
  serviceName: redis-cluster-service
  replicas: 6
  selector:
    matchLabels:
      app: redis-cluster
  template:
    metadata:
      labels:
        app: redis-cluster
    spec:
      volumes:
      - name: redis-config
        configMap:
          name: redis-cluster-config
      containers:
      - name: redis
        image: 192.168.110.227:8080/redis/redis-arm
        imagePullPolicy: IfNotPresent
        # ========== 关键修正：env移到容器内部（此处是正确层级） ==========
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        # =============================================================
        ports:
        - containerPort: 6379
        - containerPort: 16379
        volumeMounts:
        - name: redis-data
          mountPath: /data
        - name: redis-config
          mountPath: /etc/redis
        command:
        - sh
        - -c
        - |
          cp /etc/redis/redis.conf /data/redis.conf
          sed -i "s|{{POD_NAME}}|${POD_NAME}|g" /data/redis.conf
          redis-server /data/redis.conf
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 10
          periodSeconds: 5
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 3
  # 持久化存储声明
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: redis-data
    spec:
      storageClassName: nfs
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi